<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cesium Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #cesiumContainer { width: 100%; height: 100%; }
  </style>
  <!-- Cesium CSS (served locally by vite-plugin-cesium at /cesium/) -->
  <link rel="stylesheet" href="/cesium/Widgets/widgets.css" />
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- Cesium JS (served locally by vite-plugin-cesium at /cesium/) -->
  <script src="/cesium/Cesium.js"></script>
  <!-- Babel standalone for TS→JS transpilation (local copy at /babel.min.js) -->
  <script src="/babel.min.js"></script>

  <script>
    (function() {
      'use strict';

      var currentViewer = null;
      var userStyleEl = null;

      // Intercept console
      ['log', 'warn', 'info', 'error'].forEach(function(level) {
        var orig = console[level].bind(console);
        console[level] = function() {
          var args = Array.prototype.slice.call(arguments);
          var msg = args.map(function(a) {
            if (typeof a === 'object') {
              try { return JSON.stringify(a, null, 2); } catch(e) { return String(a); }
            }
            return String(a);
          }).join(' ');

          if (level === 'error') {
            window.parent.postMessage({ type: 'ERROR', message: msg }, '*');
          } else {
            window.parent.postMessage({ type: 'LOG', level: level, message: msg }, '*');
          }
          orig.apply(console, arguments);
        };
      });

      // Global error handlers
      window.addEventListener('error', function(event) {
        window.parent.postMessage({
          type: 'ERROR',
          message: event.message || 'Unknown error',
          stack: event.error ? event.error.stack : undefined
        }, '*');
      });

      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        var msg = reason instanceof Error ? reason.message : String(reason);
        var stack = reason instanceof Error ? reason.stack : undefined;
        window.parent.postMessage({ type: 'ERROR', message: msg, stack: stack }, '*');
      });

      function cleanup() {
        return new Promise(function(resolve) {
          // Remove user style
          if (userStyleEl && userStyleEl.parentNode) {
            userStyleEl.parentNode.removeChild(userStyleEl);
            userStyleEl = null;
          }

          // Destroy viewer
          if (currentViewer) {
            try {
              if (!currentViewer.isDestroyed()) {
                currentViewer.destroy();
              }
            } catch(e) {
              // ignore
            }
            currentViewer = null;
          }

          // Clear container
          var container = document.getElementById('cesiumContainer');
          if (container) {
            container.innerHTML = '';
          }

          // Give WebGL context 50ms to recover
          setTimeout(resolve, 50);
        });
      }

      function normalizePath(path) {
        return path.replace(/\\/g, '/').replace(/^\.\//, '');
      }

      function dirname(path) {
        var normalized = normalizePath(path);
        var idx = normalized.lastIndexOf('/');
        return idx === -1 ? '' : normalized.slice(0, idx);
      }

      function resolveImport(fromFile, specifier) {
        if (!specifier.startsWith('.')) return specifier;

        var baseDir = dirname(fromFile);
        var rawParts = (baseDir ? baseDir + '/' : '') + specifier;
        var parts = rawParts.split('/');
        var resolved = [];

        for (var i = 0; i < parts.length; i++) {
          var part = parts[i];
          if (!part || part === '.') continue;
          if (part === '..') {
            resolved.pop();
          } else {
            resolved.push(part);
          }
        }

        var candidate = resolved.join('/');
        return normalizePath(candidate);
      }

      function collectModuleFiles(files) {
        var moduleFiles = {};
        Object.keys(files).forEach(function(name) {
          if (/\.(ts|tsx|js|jsx)$/.test(name)) {
            moduleFiles[normalizePath(name)] = files[name];
          }
        });
        return moduleFiles;
      }

      function buildModuleBundle(files, entryFile) {
        var moduleFiles = collectModuleFiles(files);
        var logicalFiles = Object.keys(moduleFiles);
        var codeByFile = {};

        logicalFiles.forEach(function(file) {
          var result = Babel.transform(moduleFiles[file], {
            presets: [['typescript', { allExtensions: true, isTSX: file.endsWith('.tsx') }]],
            plugins: ['transform-modules-commonjs'],
            filename: file,
            sourceType: 'module'
          });
          codeByFile[file] = result.code;
        });

        function resolveExistingModule(fromFile, specifier) {
          var resolved = resolveImport(fromFile, specifier);
          var candidates = [
            resolved,
            resolved + '.ts',
            resolved + '.tsx',
            resolved + '.js',
            resolved + '.jsx',
            resolved + '/index.ts',
            resolved + '/index.js',
          ];

          for (var i = 0; i < candidates.length; i++) {
            if (Object.prototype.hasOwnProperty.call(codeByFile, candidates[i])) {
              return candidates[i];
            }
          }
          return null;
        }

        logicalFiles.forEach(function(file) {
          codeByFile[file] = codeByFile[file].replace(
            /require\((['"])([^'"]+)\1\)/g,
            function(full, quote, specifier) {
              if (!specifier.startsWith('.')) return full;
              var target = resolveExistingModule(file, specifier);
              if (!target) return full;
              return '__require("' + target + '")';
            }
          );
        });

        var moduleTable = logicalFiles.map(function(file) {
          return JSON.stringify(file) + ': function(module, exports, __require) {\n' + codeByFile[file] + '\n}';
        }).join(',\n');

        return [
          '(function(){',
          'var __modules = {',
          moduleTable,
          '};',
          'var __cache = {};',
          'function __require(id) {',
          '  if (__cache[id]) return __cache[id].exports;',
          '  if (!Object.prototype.hasOwnProperty.call(__modules, id)) {',
          '    throw new Error("Module not found: " + id);',
          '  }',
          '  var module = { exports: {} };',
          '  __cache[id] = module;',
          '  __modules[id](module, module.exports, __require);',
          '  return module.exports;',
          '}',
          '__require(' + JSON.stringify(entryFile) + ');',
          '})();'
        ].join('\n');
      }

      function runCode(files, cesiumToken) {
        window.parent.postMessage({ type: 'RUN_START' }, '*');

        cleanup().then(function() {
          try {
            // Set Cesium token if provided
            if (cesiumToken && window.Cesium) {
              window.Cesium.Ion.defaultAccessToken = cesiumToken;
            }

            // Inject CSS
            var cssContent = files['style.css'] || '';
            if (cssContent) {
              userStyleEl = document.createElement('style');
              userStyleEl.textContent = cssContent;
              document.head.appendChild(userStyleEl);
            }

            var entryFile = files['main.ts'] ? 'main.ts' : (files['main.js'] ? 'main.js' : '');
            if (!entryFile) {
              window.parent.postMessage({ type: 'ERROR', message: 'main.ts is empty' }, '*');
              return;
            }

            try {
              window.Cesium = window.Cesium;
              window.container = document.getElementById('cesiumContainer');
              window.viewerRef = { current: null };

              var bundleCode = buildModuleBundle(files, entryFile);
              new Function(bundleCode)();

              setTimeout(function() {
                if (window.viewerRef && window.viewerRef.current) {
                  currentViewer = window.viewerRef.current;
                }
                window.parent.postMessage({ type: 'RUN_SUCCESS' }, '*');
              }, 0);
            } catch(transpileError) {
              window.parent.postMessage({
                type: 'ERROR',
                message: 'Transpile error: ' + transpileError.message
              }, '*');
              return;
            }
          } catch(err) {
            window.parent.postMessage({
              type: 'ERROR',
              message: err.message || String(err),
              stack: err.stack
            }, '*');
          }
        });
      }

      // Listen for messages from parent
      window.addEventListener('message', function(event) {
        var msg = event.data;
        if (!msg || !msg.type) return;

        if (msg.type === 'RUN_CODE') {
          var payload = msg.payload || {};
          runCode(payload.files || {}, payload.cesiumToken);
        }
      });

      // Signal ready when all resources are loaded
      window.addEventListener('load', function() {
        window.parent.postMessage({ type: 'READY' }, '*');
      });
    })();
  </script>
</body>
</html>
